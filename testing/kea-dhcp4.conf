{
  "Dhcp4": {
    "interfaces-config": {
      "interfaces": [
        "dummy0",
        "dummy1",
        "dummy2"
      ]
    },
    "control-sockets": [
      {
        "socket-type": "http",
        "socket-address": "0.0.0.0",
        "socket-port": 8000
      },
      {
        "socket-type": "http",
        "socket-address": "0.0.0.0",
        "socket-port": 8001,
        "authentication": {
          "type": "basic",
          "realm": "kea-dhcp4",
          "clients": [
            {
              "user": "admin",
              "password": "secret"
            }
          ]
        }
      }
    ],
    "hooks-libraries": [
      {
        "library": "libdhcp_lease_cmds.so"
      },
      {
        "library": "libdhcp_host_cmds.so"
      },
      {
        "library": "libdhcp_subnet_cmds.so"
      },
      {
        "library": "libdhcp_pgsql.so"
      },
      {
        "library": "libdhcp_flex_id.so",
        "parameters": {
          "identifier-expression": "substring(relay4[2].hex, 0, 6)"
        }
      }
    ],
    "lease-database": {
      "type": "postgresql",
      "host": "db",
      "port": 5432,
      "name": "kea",
      "user": "kea",
      "password": "kea"
    },
    "hosts-databases": [
      {
        "type": "postgresql",
        "host": "db",
        "port": 5432,
        "name": "kea",
        "user": "kea",
        "password": "kea"
      }
    ],
    "subnet4": [
      {
        "id": 1,
        "subnet": "10.67.0.0/24",
        "pools": [
          {
            "pool": "10.67.0.100 - 10.67.0.200"
          }
        ],
        "option-data": [
          {
            "name": "routers",
            "data": "10.67.0.1"
          }
        ],
        "interface": "dummy0"
      },
      {
        "id": 2,
        "subnet": "10.67.1.0/24",
        "pools": [
          {
            "pool": "10.67.1.100 - 10.67.1.200"
          }
        ],
        "option-data": [
          {
            "name": "routers",
            "data": "10.67.1.1"
          }
        ],
        "interface": "dummy1"
      },
      {
        "id": 3,
        "subnet": "10.67.2.0/24",
        "pools": [
          {
            "pool": "10.67.2.100 - 10.67.2.200"
          }
        ],
        "option-data": [
          {
            "name": "routers",
            "data": "10.67.2.1"
          }
        ],
        "interface": "dummy2"
      }
    ],
    "loggers": [
      {
        "name": "kea-dhcp4",
        "output_options": [
          {
            "output": "stdout"
          }
        ],
        "severity": "INFO"
      }
    ]
  }
}
